name: iOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.41.9"
  PROJECT_DIR: apps/flutter_cpemanager

jobs:
  build-ios:
    name: Build iOS IPA (for TrollStore)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.PROJECT_DIR }}/ios
        run: pod install --repo-update

      - name: Build iOS (no codesign)
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Package IPA (for TrollStore)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r CPEManager.ipa Payload/
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPEManager-iOS-${{ github.ref_name || 'dev' }}
          path: ${{ env.PROJECT_DIR }}/build/ios/iphoneos/CPEManager.ipa
